<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>عقار جدة والرياض — جوال</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap');
  :root{--ink:#1b2326;--ink2:#5c6b6e;--line:#e6e3da;--bg:#f5f3ec;--card:#fffdf9;
    --accent:#0f7a73;--accent-d:#0a5651;--accent-soft:rgba(15,122,115,.1);
    --shadow:0 1px 2px rgba(20,30,30,.05),0 4px 14px rgba(20,30,30,.05);}
  body.land{--accent:#9a6a2f;--accent-d:#6e4a1c;--accent-soft:rgba(154,106,47,.1)}
  body.cmp{--accent:#5b54b0;--accent-d:#3f3886;--accent-soft:rgba(91,84,176,.1)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:40px}
  .sticky{position:sticky;top:0;z-index:20;background:linear-gradient(var(--bg) 78%,rgba(245,243,236,0));padding:14px 14px 8px}
  .htop{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:4px}
  h1{font-size:16px;font-weight:700}
  .scrape{font-size:10.5px;color:var(--ink2);text-align:left;line-height:1.3;font-variant-numeric:tabular-nums}
  .scrape b{display:block;color:var(--ink);font-weight:600;font-size:11.5px}
  .citytoggle{display:flex;background:#1d2928;border-radius:12px;padding:4px;gap:4px;margin:8px 0}
  .citytoggle button{flex:1;border:0;background:transparent;font-family:inherit;font-size:15px;font-weight:700;color:#9fb0ad;padding:10px;border-radius:9px;cursor:pointer;transition:all .2s}
  .citytoggle button.on{background:#fff;color:#10302c}
  .typescroll{display:flex;gap:6px;overflow-x:auto;padding:2px 0 6px;scrollbar-width:none}
  .typescroll::-webkit-scrollbar{display:none}
  .typescroll button{flex:0 0 auto;border:1px solid var(--line);background:var(--card);font-family:inherit;font-size:13.5px;font-weight:600;color:var(--ink2);padding:8px 16px;border-radius:20px;cursor:pointer;transition:all .2s}
  .typescroll button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .body{padding:0 14px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 13px}
  .stat .k{font-size:10.5px;color:var(--ink2);margin-bottom:4px}
  .stat .v{font-size:17px;font-weight:700;color:var(--accent-d);font-variant-numeric:tabular-nums}
  .stat .v small{font-size:11px;font-weight:500;color:var(--ink2)}
  .toolbar{display:flex;gap:8px;margin-bottom:12px}
  .search{flex:1;position:relative}
  .search input{width:100%;padding:11px 38px 11px 12px;border:1px solid var(--line);border-radius:11px;font-family:inherit;font-size:14px;background:var(--card);color:var(--ink)}
  .search input:focus{outline:none;border-color:var(--accent)}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.4}
  select{border:1px solid var(--line);border-radius:11px;background:var(--card);font-family:inherit;font-size:13px;font-weight:600;color:var(--ink);padding:0 10px;cursor:pointer}
  .count{font-size:12px;color:var(--ink2);margin:0 2px 10px}
  .dcard{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow)}
  .dhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
  .dname{font-size:15.5px;font-weight:700}.dn{font-size:11.5px;color:var(--ink2);font-weight:500}
  .drow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-top:1px solid #f0ede4;font-size:13px}
  .drow:first-of-type{border-top:0}
  .drow .lbl{color:var(--ink2);display:flex;align-items:center;gap:7px}
  .drow .val{font-weight:600;font-variant-numeric:tabular-nums}
  .big{font-size:20px;font-weight:700;color:var(--accent-d);font-variant-numeric:tabular-nums}
  .dot{width:9px;height:9px;border-radius:3px;flex:0 0 auto}
  .ratio{font-weight:700}.na{color:#c2cac8}
  .ppm-pill{padding:2px 8px;border-radius:6px;font-weight:700;font-variant-numeric:tabular-nums}
  .cnt{color:var(--ink2);font-size:11px;font-weight:400;margin-right:4px}
  footer{font-size:11px;color:var(--ink2);line-height:1.6;padding:8px 2px 0}
</style>
</head>
<body>
<div class="sticky">
  <div class="htop"><h1>المعروض العقاري · الأحياء</h1><div class="scrape" id="scrape"></div></div>
  <div class="citytoggle">

  <div class="typescroll">

    <button data-m="vil" onclick="setMode('vil')">فلل</button>
    <button data-m="flo" onclick="setMode('flo')">أدوار</button>
    <button data-m="land" onclick="setMode('land')">أراضي</button>

</div>
<div class="body">

  <div class="toolbar">

    <select id="sort" onchange="changeSort()"></select>
  </div>
  <div class="count" id="count"></div>
  <div id="list"></div>
  <footer id="foot"></footer>
</div>

const TYPECOL={apt:[47,125,138],land:[154,120,60],flo:[80,110,150],vil:[150,90,150]};
const TYPELBL={apt:'شقق',land:'أراضي',flo:'أدوار',vil:'فلل'};
const fmt=n=>n==null?null:n.toLocaleString('en-US');
const bigfmt=n=>n==null?null:(n>=1e9?(n/1e9).toFixed(2)+' مليار':n>=1e6?(n/1e6).toFixed(1)+' مليون':fmt(n));
const rows=()=> mode==='cmp'?D().cmp:D()[mode].rows;
const SORTS={
  built:[['n','الأكثر مخزونًا'],['ppm','الأغلى متر'],['ppm_asc','الأرخص متر'],['med_price','الأعلى سعرًا'],['d','أبجدي']],
  land:[['n','الأكثر مخزونًا'],['ppm','الأغلى متر'],['ppm_asc','الأرخص متر'],['tot_m','الأكبر مساحة'],['d','أبجدي']],
  cmp:[['total','الأكثر عددًا'],['apt_ppm','أغلى شقق'],['vil_ppm','أغلى فلل'],['flo_ppm','أغلى أدوار'],['land_ppm','أغلى أراضي'],['d','أبجدي']]
};
function sortOpts(){return mode==='cmp'?SORTS.cmp:(mode==='land'?SORTS.land:SORTS.built);}
function changeSort(){const v=document.getElementById('sort').value;
  if(v==='ppm_asc'){sortK='ppm';sortDir=1;}else if(v==='d'){sortK='d';sortDir=1;}else{sortK=v;sortDir=-1;}render();}
function cmpRange(k){const a=D().cmp.map(r=>r[k]).filter(x=>x!=null);return[Math.min(...a),Math.max(...a)];}
let R={};
function cmpColor(k,v){if(v==null)return['#f2f0ea','#c2cac8'];const[mn,mx]=R[k];const t=mx>mn?(v-mn)/(mx-mn):.5;
  const c=TYPECOL[k.replace('_ppm','')]||[120,120,120];return[`rgba(${c[0]},${c[1]},${c[2]},${.1+t*.28})`,'#1b2326'];}
function statCards(){let c;
  if(mode==='cmp'){const t=D().meta.city_totals;c=[['إجمالي الإعلانات',fmt(t.total)],['للبيع',fmt(t.sale)],['للإيجار',fmt(t.rent)],['أحياء المقارنة',fmt(D().cmp.length)]];}
  else{const t=D()[mode].tot;c=[['المخزون',fmt(t.n)],['عينة السعر',fmt(t.n_px)],['وسيط المتر',fmt(t.ppm)+' <small>ر.س</small>'],['وسيط السعر',bigfmt(t.price)+' <small>ر.س</small>']];}

function cardCmp(r){
  const types=['apt','vil','flo','land'];
  const rws=types.map(t=>{const v=r[t+'_ppm'],n=r[t+'_n'];const c=TYPECOL[t];
    const dot=`<span class="dot" style="background:rgb(${c[0]},${c[1]},${c[2]})"></span>`;
    if(v==null){return `<div class="drow"><span class="lbl">${dot}${TYPELBL[t]}</span><span class="val"><span class="cnt">(${n||0})</span> <span class="na">—</span></span></div>`;}
    const[bg]=cmpColor(t+'_ppm',v);
    return `<div class="drow"><span class="lbl">${dot}${TYPELBL[t]}</span><span class="val"><span class="cnt">(${fmt(n)})</span> <span class="ppm-pill" style="background:${bg}">${fmt(v)}</span></span></div>`;}).join('');

  let rs=rows().filter(r=>r.d.includes(query));
  rs.sort((a,b)=>{let x=a[sortK],y=b[sortK];if(sortK==='d')return x<y?-sortDir:x>y?sortDir:0;x=x==null?-1:x;y=y==null?-1:y;return(x-y)*sortDir;});
  document.getElementById('count').textContent=rs.length+' حي';
  const fn=mode==='cmp'?cardCmp:(mode==='land'?cardLand:cardBuilt);
  document.getElementById('list').innerHTML=rs.map(fn).join('');
}
function refresh(){
  document.body.classList.remove('land','cmp');if(mode==='land')document.body.classList.add('land');if(mode==='cmp')document.body.classList.add('cmp');
  document.querySelectorAll('.typescroll button').forEach(b=>b.classList.toggle('on',b.dataset.m===mode));
  document.querySelectorAll('.citytoggle button').forEach(b=>b.classList.toggle('on',b.dataset.c===city));
  document.getElementById('scrape').innerHTML=`تاريخ السحب<b>${D().scrape.slice(0,10)}</b>`;
  document.getElementById('foot').innerHTML = mode==='cmp'
    ? 'كل نوع: سعر المتر و(المخزون). «—» = أقل من 5 إعلانات صالحة للسعر.'
    : (mode==='land'?'العدد = مخزون الأراضي (حذف القمامة). السعر من عينة بعد استبعاد الشواذ.'
      :'«مخزون» = العدد الحقيقي · «عينة» = الإعلانات المستخدمة لحساب السعر · متر الأرض وبجانبه عدد الأراضي المبني عليه السعر.');
  fillSort();statCards();render();
}
function setMode(m){mode=m;sortK=(m==='cmp')?'total':'n';sortDir=-1;refresh();
  document.querySelector('.typescroll button[data-m="'+m+'"]').scrollIntoView({inline:'center',behavior:'smooth',block:'nearest'});}
function setCity(c){city=c;sortK=(mode==='cmp')?'total':'n';sortDir=-1;refresh();}
document.getElementById('q').addEventListener('input',e=>{query=e.target.value.trim();render();});
refresh();
</script>
</body>
